<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mii Foodservice">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#7A2E6E" stroke-width="4.5"/>
  <!-- Calligraphic m monogram (plum) -->
  <path d="M26 70 C22 50 24 30 31 31 C37 32 35 50 34 64
           C39 46 46 32 53 34 C58 35 56 52 55 65
           C60 47 67 33 74 35 C79 36 77 54 76 67"
        fill="none" stroke="#7A2E6E" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wheat stems (green) -->
  <path d="M60 74 C66 60 73 50 82 40" fill="none" stroke="#3FA535" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M60 74 C70 64 78 56 86 50" fill="none" stroke="#3FA535" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Wheat grains, stalk 1 -->
  <g fill="#3FA535">
    <ellipse cx="80" cy="40" rx="2.6" ry="4.6" transform="rotate(40 80 40)"/>
    <ellipse cx="76" cy="45" rx="2.6" ry="4.6" transform="rotate(40 76 45)"/>
    <ellipse cx="72" cy="50" rx="2.6" ry="4.6" transform="rotate(40 72 50)"/>
    <ellipse cx="68" cy="55" rx="2.6" ry="4.6" transform="rotate(40 68 55)"/>
    <ellipse cx="64" cy="60" rx="2.6" ry="4.6" transform="rotate(40 64 60)"/>
  </g>
  <!-- Wheat grains, stalk 2 -->
  <g fill="#3FA535">
    <ellipse cx="85" cy="51" rx="2.6" ry="4.6" transform="rotate(48 85 51)"/>
    <ellipse cx="80" cy="55" rx="2.6" ry="4.6" transform="rotate(48 80 55)"/>
    <ellipse cx="75" cy="59" rx="2.6" ry="4.6" transform="rotate(48 75 59)"/>
    <ellipse cx="70" cy="63" rx="2.6" ry="4.6" transform="rotate(48 70 63)"/>
    <ellipse cx="65" cy="67" rx="2.6" ry="4.6" transform="rotate(48 65 67)"/>
  </g>
</svg>
